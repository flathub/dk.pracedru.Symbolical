id: dk.pracedru.Symbolical
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
base: com.riverbankcomputing.PyQt.BaseApp
base-version: '6.10'
command: symbolical
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --socket=pulseaudio
  - --env=QT_AUDIO_BACKEND=pulseaudio
  - --socket=cups
cleanup-commands:
  - /app/cleanup-BaseApp.sh
build-options:
  env:
    - BASEAPP_REMOVE_WEBENGINE=1
modules:
  - name: symbolical
    buildsystem: meson
    sources:
      - type: git
        url: https://gitlab.com/symbolical/symbolical.git
        commit: e41ae0ec9b9a0bfa83004cbd330fbae060ece70f
        tag: v0.6.0.0
