id: dk.pracedru.Symbolical
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
base: com.riverbankcomputing.PyQt.BaseApp
base-version: '6.10'
command: symbolical
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --socket=pulseaudio
  - --env=QT_AUDIO_BACKEND=pulseaudio
  - --socket=cups
modules:
  - name: symbolical
    buildsystem: simple
    build-commands:
      - install -d /app/symbolical
      - cp -r src/* /app/symbolical/
      - install -Dm755 flatpak/flatpak_launcher.sh /app/bin/symbolical
      - install -Dm644 flatpak/dk.pracedru.Symbolical.flatpak /app/share/applications/dk.pracedru.Symbolical.flatpak
      - install -Dm644 flatpak/dk.pracedru.Symbolical.xml /app/share/mime/packages/dk.pracedru.Symbolical.xml
      - install -Dm644 src/icons/icon-256.png /app/share/icons/hicolor/256x256/apps/dk.pracedru.Symbolical.png
      - install -Dm644 fonts/NotoSerif.ttf /app/share/fonts/NotoSerif.ttf
      - fc-cache -f -v || true
      - install -Dm644 flatpak/index.theme /app/share/icons/hicolor/index.theme
      - install -Dm644 src/icons/app_icon.svg /app/share/icons/hicolor/scalable/mimetypes/symbolical-file.svg
      - install -Dm644 flatpak/dk.pracedru.Symbolical.metainfo.xml /app/share/metainfo/dk.pracedru.Symbolical.metainfo.xml
      - gtk-update-icon-cache -f /app/share/icons/hicolor
    post-install:
      - mkdir -p $FLATPAK_DEST/share/licenses/$FLATPAK_ID/
      - mv LICENSE $FLATPAK_DEST/share/licenses/$FLATPAK_ID/LICENSE
      - mv licenses $FLATPAK_DEST/share/licenses/$FLATPAK_ID/
    sources:
      - type: git
        url: https://gitlab.com/symbolical/symbolical.git
        commit: 30b2eb4e
