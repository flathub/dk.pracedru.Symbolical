id: dk.pracedru.Symbolical
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
base: com.riverbankcomputing.PyQt.BaseApp
base-version: '6.10'
command: symbolical
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --socket=pulseaudio
  - --env=QT_AUDIO_BACKEND=pulseaudio
  - --socket=cups
cleanup-commands:
  - /app/cleanup-BaseApp.sh
modules:
  - name: symbolical
    buildsystem: meson
    sources:
      - type: git
        url: https://gitlab.com/symbolical/symbolical.git
        commit: 0d406b862ca8fbeb8e842f8a5c5633e83fd26bf7
